<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved Papers — ScholarAI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="/">
        <div class="brand-icon">📚</div>
        Scholar<span class="brand-accent">AI</span>
      </a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">← Search</a></li>
        <li class="nav-item">
          <a class="nav-link nav-bookmarks-link active-nav" href="/bookmarks.html">
            <i class="fa-solid fa-bookmark"></i> Saved
            <span id="bookmark-badge" class="bookmark-badge" style="display:none">0</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- ===== BOOKMARKS HEADER ===== -->
  <div class="results-header">
    <div class="container">
      <h1 style="font-family:var(--font-display);color:var(--cream);font-size:1.6rem;font-weight:600">
        <i class="fa-solid fa-bookmark" style="color:var(--brass-light);margin-right:0.5rem"></i>
        Saved Papers
      </h1>
      <div class="results-meta" id="bookmarks-count">Loading...</div>
      <div style="margin-top:1rem;display:flex;gap:0.6rem;flex-wrap:wrap">
        <button class="btn-export-small" onclick="exportBookmarksBibTeX()">
          <i class="fa-solid fa-file-code"></i> Export BibTeX
        </button>
        <button class="btn-export-small" onclick="exportBookmarksCSV()">
          <i class="fa-solid fa-file-csv"></i> Export CSV
        </button>
      </div>
    </div>
  </div>

  <!-- ===== BOOKMARKS AREA ===== -->
  <div class="results-area">
    <div class="container">
      <div class="row">
        <div class="col-lg-8 offset-lg-2" id="bookmarks-container">
          <div class="state-card">
            <div class="state-icon">📌</div>
            <div class="state-title">Loading saved papers...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== NOTES MODAL ===== -->
  <div class="modal-overlay" id="notes-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title"><i class="fa-regular fa-note-sticky"></i> Research Notes</h3>
        <button class="modal-close" onclick="closeNotesModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-subtitle" id="notes-modal-title"></div>
      <textarea id="notes-textarea" placeholder="Write your research notes here..."></textarea>
      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="closeNotesModal()">Cancel</button>
        <button class="btn-modal-save" id="notes-save-btn">
          <i class="fa-solid fa-floppy-disk"></i> Save Note
        </button>
      </div>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer>
    <div class="container">
      <p>
        ScholarAI — AI Research Paper Recommender &nbsp;·&nbsp;
        Data from <a href="https://arxiv.org/" target="_blank">arXiv</a>
      </p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
